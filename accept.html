<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>스승님 - 프로용 견적 발송</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Pretendard', sans-serif; }</style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-5">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-8 border border-slate-100">
        <div class="mb-8 text-center">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h1 class="text-2xl font-black text-slate-800">레슨 견적서 발송</h1>
            <p class="text-slate-500 font-medium mt-2">고객에게 보낼 최종 정보를 확인해주세요.</p>
        </div>

        <div class="space-y-6">
            <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                <p class="text-[11px] font-black text-blue-500 uppercase tracking-widest mb-2">요청 내용 확인</p>
                <div id="customerSummary" class="text-slate-700 font-bold text-sm space-y-1">
                    데이터를 불러오는 중...
                </div>
            </div>

            <div>
    <label class="text-xs font-black text-slate-400 mb-2 block ml-1">최종 레슨비 (전체 인원 합계 금액)</label>
    <input type="number" id="finalPriceInput" placeholder="예: 350000 (숫자만)" 
        class="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold text-lg">
    
    <p class="text-[10px] text-blue-600 mt-2 ml-1 font-bold">
        ※ 고객은 위 금액만 결제하며, 현장 추가 결제 유도 시 이용이 제한됩니다.
    </p>
</div>

            <div>
                <label class="text-xs font-black text-slate-400 mb-2 block ml-1">레슨 가능 장소 (상세)</label>
                <input type="text" id="lessonLocation" placeholder="예: 대치동 OO연습장, 압구정역 인근 등" 
                    class="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold text-sm">
                <p class="text-[10px] text-red-500 mt-2 ml-1 font-bold">※ 장소 정보에 개인정보 입력 시 발송이 차단됩니다.</p>
            </div>

            <div>
                <label class="text-xs font-black text-slate-400 mb-2 block ml-1">프로 추가 안내 사항</label>
                <textarea id="proNote" rows="2" placeholder="예: 그린피/카트비 별도입니다."
                    class="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold text-sm"></textarea>
            </div>

            <button onclick="sendAccept()" id="submitBtn"
                class="w-full bg-blue-600 text-white font-black py-5 rounded-[1.5rem] shadow-xl shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all text-lg">
                견적 승인 및 카톡 발송
            </button>
            
            <a href="https://pf.kakao.com/_kxawRn/chat" 
               class="block w-full text-center text-slate-400 font-bold py-3 mt-4 border-2 border-slate-100 rounded-2xl text-sm">
               스케줄 조정 및 운영진 문의하기
            </a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || "요청 고객";
        const type = params.get('type') || "레슨";
        const contact = params.get('contact') || "";
        const requestId = params.get('requestId') || "";
        const fixedPrice = params.get('price') || "";
        const selectedPro = params.get('selectedPro') || "스승님";
        const lessonCount = params.get('lessonCount') || "1회"; 

        document.getElementById('customerSummary').innerHTML = `
            <p>👤 고객명: ${name}</p>
            <p>⛳ 종류: ${type}</p>
            <p>👥 인원/횟수: ${lessonCount}</p> 
        `;

        if (fixedPrice) {
            const purePrice = fixedPrice.replace(/[^0-9]/g, '');
            document.getElementById('finalPriceInput').value = purePrice;
        }

        const sendAccept = async () => {
    const price = document.getElementById('finalPriceInput').value;
    const location = document.getElementById('lessonLocation').value;
    const note = document.getElementById('proNote').value;
    const btn = document.getElementById('submitBtn');

    if (!price || parseInt(price) < 1000) return alert("올바른 가격을 입력해주세요!");
    if (!location) return alert("레슨 장소를 입력해주세요!");

    // 1. 추가 안내 사항(proNote)에서만 영문 및 특수문자 차단
    const cleanNote = (note || "").replace(/\s/g, '').toLowerCase();
    const invalidPattern = /[^가-힣0-9.,/~()]/;
    
    if (note && invalidPattern.test(cleanNote)) {
        alert("보안 정책상 '추가 안내 사항'에는 영문 및 특수문자(!@#$%^&* 등)를 입력할 수 없습니다. 한글로 적어주세요.");
        return;
    }

    // 2. 전체 텍스트에 대한 키워드 및 연락처 검사 (장소 포함)
    const combinedText = (location + note).replace(/\s/g, '').toLowerCase();
    const phonePattern = /(01[016789]|02|0[3-9][0-9])[- .]*(\d{3,4})[- .]*(\d{4})/;
    const digitPattern = /\d{8,11}/;
    const kakaoKeywords = ['카톡', '카카오', '인스타', '잉스타', '임스타', 'insta', '인별', 'instagram', 'dm', 'link', 'kakao', '라인', 'line', '공일공', '오픈채팅', '옵챗', '텔레그램', '영일영', '전화', '카.톡', '연락처', '리틀리', 'littly', '링크트리', '.com', 'http', '유튜브', 'youtube', '번호', '공1공', 'o1o', '영1영', '0l0', '아이디', '검색', '친추', '팔로우', '.kr', '.me', '.link', '계좌', '입금', '이체', '현결', '현금', 'ID'];
    
    if (phonePattern.test(combinedText) || digitPattern.test(combinedText) || kakaoKeywords.some(k => combinedText.includes(k))) {
        alert("경고: 장소 및 안내 사항에는 연락처 등 개인 정보를 입력할 수 없습니다.");
        return;
    }
    
    btn.disabled = true;
    btn.innerText = "발송 중...";

    const payload = {
        requestId: requestId,
        name: name,
        lessonCount: lessonCount,
        selectedPro: selectedPro,
        contact: contact,
        lessonType: type,
        finalPrice: parseInt(price).toLocaleString() + "원",
        lessonLocation: location,
        proNote: note || "별도 안내 사항 없음",
        paymentUrl: `https://rlaeodn1015-oss.github.io/ssnim-request-landing/pay.html?requestId=${requestId}&price=${price}&name=${encodeURIComponent(name)}`,
        status: "accepted"
    };

    try {
        const ZAPIER_URL = "https://hooks.zapier.com/hooks/catch/27197789/ujdmj18/"; 
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzm4khJWhFRaWNkC1hmwFfSUtDK26_CAu_zHI9P-93b4ESCrzeRYUOsXdOPjO-0oIkG/exec";

        await fetch(ZAPIER_URL, {
            method: "POST",
            body: JSON.stringify(payload)
        });

        await fetch(GOOGLE_SHEET_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({ action: "updateQuote", ...payload })
});

        alert("✅ 견적 발송 완료! 고객에게 결제 알림톡이 전송되었습니다.");
        btn.innerText = "발송 완료";
        window.location.href = "https://pf.kakao.com/_kxawRn/chat"; 
        
    } catch (err) {
        console.error(err);
        alert("오류가 발생했습니다. 다시 시도해주세요.");
        btn.disabled = false;
        btn.innerText = "견적 승인 및 카톡 발송";
    }
};
    </script>
</body>
</html>
