<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>스승님 - 프로용 견적 발송</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Pretendard', sans-serif; }</style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-5">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-8 border border-slate-100">
        <div class="mb-8 text-center">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h1 id="mainTitle" class="text-2xl font-black text-slate-800">레슨 견적서 발송</h1>
            <p id="subTitle" class="text-slate-500 font-medium mt-2">고객에게 보낼 최종 정보를 확인해주세요.</p>
        </div>

        <div class="space-y-6">
            <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                <p class="text-[11px] font-black text-blue-500 uppercase tracking-widest mb-2">요청 내용 확인</p>
                <div id="customerSummary" class="text-slate-700 font-bold text-sm space-y-1">데이터를 불러오는 중...</div>
            </div>

            <div id="priceSection">
                <label class="text-xs font-black text-slate-400 mb-2 block ml-1">최종 레슨비 (전체 인원 합계 금액)</label>
                <input type="number" id="finalPriceInput" placeholder="예: 350000 (숫자만)" class="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold text-lg">
            </div>

            <div>
                <label class="text-xs font-black text-slate-400 mb-2 block ml-1">레슨 가능 장소 (상세)</label>
                <input type="text" id="lessonLocation" placeholder="예: 대치동 OO연습장, 압구정역 인근 등" class="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold text-sm">
            </div>

            <div>
                <label class="text-xs font-black text-slate-400 mb-2 block ml-1">프로 추가 안내 사항</label>
                <textarea id="proNote" rows="2" placeholder="예: 그린피/카트비 별도입니다." class="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold text-sm"></textarea>
            </div>

            <button onclick="sendAccept()" id="submitBtn" class="w-full bg-blue-600 text-white font-black py-5 rounded-[1.5rem] shadow-xl shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all text-lg">
                견적 승인 및 카톡 발송
            </button>
        </div>
    </div>

    <script>
        // [1] 전역 변수 설정
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || params.get('userName') || "요청 고객";
        const contact = params.get('contact') || params.get('phone') || params.get('userPhone') || "";
        const requestId = params.get('requestId') || "";
        const fixedPrice = params.get('price') || "";
        const selectedPro = params.get('selectedPro') || params.get('proName') || "스승님";
        const lessonCount = params.get('lessonCount') || "1회"; 
        const schedule = params.get('schedule') || "시간 협의";
        const rawType = params.get('type') || "레슨";
        const proContact = params.get('proContact') || params.get('procontact') || params.get('proPhone') || "";
        const personCount = params.get('personCount') || params.get('person') || "1인";

        const isOneOnOne = rawType.includes('1:1');
        let sendType = isOneOnOne ? "1:1레슨" : (rawType === "레슨" ? "맞춤 레슨" : rawType);

        // [2] 페이지 로드 시 화면 초기화 (HTML이 다 그려진 후 실행)
        window.onload = () => {
            document.getElementById('customerSummary').innerHTML = `
                <p>👤 고객명: ${name}</p>
                <p>⛳ 종류: ${sendType}</p>
                <p>🔢 횟수: ${lessonCount}</p>
                <p>⏰ 시간: ${schedule}</p>
            `;

            if (fixedPrice) {
                document.getElementById('finalPriceInput').value = fixedPrice.replace(/[^0-9]/g, '');
            }

            if (isOneOnOne) {
                document.getElementById('mainTitle').innerText = "1:1 레슨 수락";
                document.getElementById('submitBtn').innerText = "1:1 레슨 수락 및 결제 요청";
            }
        };

        // [3] 견적 발송 함수
        async function sendAccept() {
            const price = document.getElementById('finalPriceInput').value;
            const location = document.getElementById('lessonLocation').value;
            const note = document.getElementById('proNote').value;
            const submitBtn = document.getElementById('submitBtn');

            if (!price || parseInt(price) < 100) return alert("올바른 가격을 입력해주세요!");
            if (!location) return alert("레슨 장소를 입력해주세요!");

            // [보안 필터링]
            const combinedText = (location + note).replace(/[^ㄱ-ㅎ가-힣a-zA-Z0-9]/g, "").toLowerCase();
            const forbiddenList = [
                // 1. 메신저 및 SNS 직접 언급
                "카톡", "카카오", "kakaotalk", "kaka", "카코", "옵챗", "오픈챗", "오픈채팅", "openchat", "톡주세요", "톡줘", "채널", "톡디", "카톡디", "오픈프로필",
                "인스타", "인스타그램", "insta", "instagram", "잉스타", "잉스타그램", "인스따", "디엠", "dm", "인타", "팔로우", "맞팔", "스토리",
                "텔레그램", "telegram", "라인", "line", "밴드", "band", "틱톡", "tiktok", "페이스북", "페북", "facebook",

                // 2. 연락처 유도 및 숫자 꼼수 (영일영, 공일공 등)
                "연락처", "전화번호", "핸드폰", "휴대폰", "핸펀", "폰번", "번호", "문자", "전화", "콜미", "연락", "영일영", "공일공", "영1영", "공1공", "영일공", "공일영",
                "공10", "영10", "0일0", "팔로우", "친추", "친구추가", "메세지", "메시지", "쪽지",

                // 3. 외부 결제 및 직거래 (매출 누수 방지)
                "직거래", "개인레슨", "외부결제", "현금결제", "계좌번호", "계좌", "송금", "입금", "이체", "토스", "카카오페이", "현금가", "할인가", "개별연락", "따로", "직접",

                // 4. 포털 및 커뮤니티 (우회 채널)
                "네이버", "블로그", "blog", "유튜브", "youtube", "유튜버", "너튜브", "카페", "cafe", "당근", "숨고", "크몽", "다음", "daum",

                // 5. 교묘한 조합 방어 (꼼수 문구)
                "문의주세", "상담주세", "연락주세", "프로필링크", "상단링크", "바이오", "주소창", "검색창에", "검색해보세", "구글", "google"
            ];
            for (let word of forbiddenList) {
                if (combinedText.includes(word)) {
                    return alert(`🚨 등록 불가: '${word}'와(과) 관련된 문구가 감지되었습니다.`);
                }
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "처리 중...";

            const paymentUrl = `https://rlaeodn1015-oss.github.io/ssnim-request-landing/pay.html?requestId=${requestId}&price=${price}&name=${encodeURIComponent(name)}`;
            
            const payload = {
                action: "createRequest",
                requestId: requestId,
                name: name,
                contact: contact,
                proContact: proContact,
                personCount: personCount, 
                type: sendType,
                lessoncount: String(lessonCount).replace("회", "").trim(), 
                club: params.get('club') || "",
                note: params.get('note') || "",
                SCHEDULE: schedule,
                LOCATION: location,
                PRONOTE: note || "별도 안내 사항 없음",
                selectedpro: selectedPro,
                price: price,
                paymentUrl: paymentUrl,
                status: "accepted"
            };

           try {
                // 1. [데이터 기록] 구글 시트로 프로가 작성한 견적 데이터를 보냅니다. (시트에 딱딱 쌓임)
                await fetch("https://script.google.com/macros/s/AKfycbxlSNtNgp7Z1xtuXTFvO9jbmjMLku3i0_d_b8Z3c_JAMjXKLEBcgdir8PPaqKcYalLK/exec", {
                    method: "POST", mode: "no-cors", body: JSON.stringify(payload)
                });

                // 2. [알림 수정] 견적서 발송은 무조건 'ujl6khu' 한 곳으로만 쏩니다.
                // 대표님이 말씀하신 : 외부레슨 견적서 전달 (공급자가 > 소비자에게 전달하는용) 주소입니다.
                // 여기로 쏴야 소비자한테만 견적 알림이 가고, 공급자(프로) 본인한테는 알림이 안 옵니다.
                const webhookUrl = "https://hooks.zapier.com/hooks/catch/27197789/ujl6khu/";

                await fetch(webhookUrl, { 
                    method: "POST", 
                    mode: "no-cors", 
                    body: JSON.stringify(payload) 
                });

                alert("✅견적서 발송 완료!");
                window.location.href = "https://pf.kakao.com/_kxawRn/chat"; 
            } catch (err) {
                alert("오류 발생");
                submitBtn.disabled = false;
                submitBtn.innerText = "견적 승인 및 카톡 발송";
            }
        }
    </script>
</body>
</html>
// 테스트
