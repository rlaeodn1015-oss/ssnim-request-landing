<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스승님 - 레슨비 결제</title>
    <script src="https://js.bootpay.co.kr/bootpay-4.3.4.min.js" type="application/javascript"></script>
</head>
<body>
    <div id="status" style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; text-align: center; flex-direction: column;">
        <p id="msg" style="font-weight: bold;">결제 모듈을 불러오는 중입니다...</p>
        <p id="sub-msg" style="font-size: 12px; color: #888; margin-top: 10px;">3초 이상 반응이 없으면 '새로고침'을 해주세요.</p>
    </div>

    <script>
    function checkAndPay() {
        const params = new URLSearchParams(window.location.search);
        // 파라미터 가져오기
        const rawPrice = params.get('price') || "0";
        const name = params.get('name') || "고객님";
        const requestId = params.get('requestId') || "req_" + new Date().getTime(); // 결제 고유 ID 필수
        
        // 가격 처리 (콤마나 한글이 섞여도 숫자만 추출)
        const price = parseInt(rawPrice.toString().replace(/[^0-9]/g, '')) || 0;

        // 결제 검증
        if (price < 100) { // 최소 결제 금액 체크
            document.getElementById('msg').innerText = "결제 금액 정보가 너무 낮거나 올바르지 않습니다.";
            document.getElementById('sub-msg').innerText = "고객 센터에 문의해주세요.";
            return;
        }

        if (typeof Bootpay === "undefined") {
            setTimeout(checkAndPay, 1000);
            return;
        }

        // 부트페이 호출
        Bootpay.requestPayment({
            "application_id": "67ecd171d9af4e5c6d21736b",
            "price": price,
            "order_name": "스승님 골프 레슨비",
            "order_id": requestId, // 중복되지 않는 고유값
            "pg": "nicepay",
            "method": "card",
            "user": { "username": name },
            "extra": { 
                "open_type": "redirect", // 🚀 모바일 결제 안정성을 위해 redirect 권장
                "display_success_result": true // 결제 완료 후 결과 보이기
            }
        }).then(async function(res) {
            // 결제 완료 시 (일반적인 완료 이벤트 체크)
            if (res.event === 'done') {
                document.getElementById('msg').innerText = "결제 완료! 장부를 업데이트 중입니다...";
                
                const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzm4khJWhFRaWNkC1hmwFfSUtDK26_CAu_zHI9P-93b4ESCrzeRYUOsXdOPjO-0oIkG/exec";
                const updateData = {
                    action: "updatePayment",
                    requestId: requestId,
                    paymentStatus: "결제 완료",
                    paidAmount: price
                };

                try {
                    // 구글 시트 장부 업데이트 (비동기 처리)
                    await fetch(GOOGLE_SHEET_URL, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify(updateData)
                    });
                    location.href = "success.html";
                } catch (err) {
                    console.error("장부 업데이트 실패:", err);
                    location.href = "success.html"; 
                }
            }
        }).catch(function(e) {
            console.error(e);
            alert("결제 창을 여는 중 오류가 발생했습니다: " + e.message);
        });
    }

    window.onload = checkAndPay;
</script>
</body>
</html>
