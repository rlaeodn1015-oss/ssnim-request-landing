<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>스승님 - 레슨비 결제</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://js.bootpay.co.kr/bootpay-4.3.4.min.js" type="application/javascript"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.03em; }
        .active-card { border-color: #0066FF; background-color: #F0F7FF; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-5">

    <div id="payment-box" class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-8 border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-slate-900 mb-2">레슨비 결제하기</h1>
            <p id="customer-info" class="text-slate-500 font-bold text-sm">정보를 불러오는 중...</p>
        </div>

        <div id="split-selector" class="space-y-4 mb-10">
            <p class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1 text-center">결제 방식 선택</p>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="setPayMode('total')" id="btn-total" class="flex flex-col items-center justify-center py-5 rounded-2xl border-2 active-card transition-all group">
                    <span class="text-xs font-bold text-slate-400 group-[.active-card]:text-blue-500 mb-1">한 번에</span>
                    <span class="text-sm font-black text-slate-900">전액 결제</span>
                </button>
                <button onclick="setPayMode('split')" id="btn-split" class="flex flex-col items-center justify-center py-5 rounded-2xl border-2 border-slate-100 bg-white transition-all group">
                    <span class="text-xs font-bold text-slate-400 group-[.active-card]:text-blue-500 mb-1">동반자와</span>
                    <span class="text-sm font-black text-slate-900">1/N 나눠내기</span>
                </button>
            </div>
            <p id="split-desc" class="text-[11px] text-center text-blue-600 font-bold opacity-0 transition-opacity">
                ※ 동반자들에게 이 페이지 링크를 공유하여 각자 결제하세요.
            </p>
        </div>

        <div class="bg-slate-50 rounded-3xl p-8 mb-8 text-center border border-slate-100 shadow-inner">
            <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3">최종 결제 금액</p>
            <p id="display-price" class="text-4xl font-black text-slate-950 tracking-tighter">0원</p>
        </div>

        <button onclick="requestBootpay()" id="pay-btn" class="w-full bg-blue-600 text-white font-black py-5 rounded-[1.5rem] shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all text-lg">
            지금 결제하기
        </button>

        <p class="text-center mt-6 text-[11px] text-slate-400 font-medium leading-relaxed">
            안전한 결제를 위해 스승님 보안 시스템이 작동 중입니다.<br>
            결제 완료 시 예약이 즉시 확정됩니다.
        </p>
    </div>

    <script>
    let rawPrice = 0;
    let finalPayPrice = 0;
    let personCount = 1;
    let requestId = "";
    let name = "";

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        
        if (params.get('status') === 'done') {
            document.getElementById('payment-box').innerHTML = "<div class='py-20 text-center font-bold text-blue-600'>결제 정보를 처리 중입니다...</div>";
            
            const updateData = {
                action: "updatePayment",
                requestId: params.get('requestId'),
                paymentStatus: "결제 완료",
                paidAmount: params.get('price')
            };
            
            fetch("https://script.google.com/macros/s/AKfycbyEehQJQKlryfjJ3PN8h46IaHCpPzbWikvlInwfmNl5CIe6CgBx1pzTaazX3fYpTmr-/exec", { 
                method: "POST", 
                mode: "no-cors", 
                body: JSON.stringify(updateData) 
            }).finally(() => {
                location.replace("success.html?v=" + new Date().getTime());
            });
            return;
        }

        // 데이터 파싱
        const priceParam = params.get('price') || "0";
        rawPrice = parseInt(priceParam.replace(/[^0-9]/g, '')) || 0; 
        name = params.get('name') || "고객님";
        requestId = params.get('requestId') || "req_" + new Date().getTime();
        const lessonType = params.get('type') || "";

        // [핵심] 인원수 계산 및 1:1 판별
        const match = lessonType.match(/\d+/);
        personCount = (match && parseInt(match[0]) > 1) ? parseInt(match[0]) : 1;
        
        // 1:1 레슨이면 인원수 강제 고정 및 UI 숨김
        const isOneOnOne = lessonType.includes('1:1');
        if (isOneOnOne) personCount = 1;

        finalPayPrice = rawPrice;

        document.getElementById('customer-info').innerText = `${name}님, 맞춤 레슨 견적입니다.`;
        document.getElementById('display-price').innerText = rawPrice.toLocaleString() + "원";
        
        // 1:1 레슨이거나 인원이 1명이면 나눠내기 숨기기
        if (isOneOnOne || personCount <= 1) {
            const selector = document.getElementById('split-selector');
            if (selector) selector.style.display = 'none';
        }
    };

    function setPayMode(mode) {
        const display = document.getElementById('display-price');
        if (mode === 'split') {
            finalPayPrice = Math.floor(rawPrice / personCount);
            document.getElementById('btn-split').classList.add('active-card');
            document.getElementById('btn-total').classList.remove('active-card');
            document.getElementById('split-desc').style.opacity = "1";
        } else {
            finalPayPrice = rawPrice;
            document.getElementById('btn-total').classList.add('active-card');
            document.getElementById('btn-split').classList.remove('active-card');
            document.getElementById('split-desc').style.opacity = "0";
        }
        display.innerText = finalPayPrice.toLocaleString() + "원";
    }

    async function requestBootpay() {
        if (finalPayPrice < 100) return alert("결제 금액이 너무 낮습니다.");
        if (typeof Bootpay === "undefined") return alert("모듈 로딩 중...");

        const successRedirect = window.location.origin + window.location.pathname + "?status=done&requestId=" + requestId + "&price=" + finalPayPrice;

        Bootpay.requestPayment({
            "application_id": "67ecd171d9af4e5c6d21736b",
            "price": finalPayPrice,
            "order_name": "스승님 골프 레슨비",
            "order_id": requestId,
            "pg": "nicepay",
            "methods": ["card", "kakao"],
            "user": { "username": name },
            "extra": { 
                "open_type": "redirect", 
                "display_success_result": false, 
                "redirect_url": successRedirect, 
                "method": "GET",
                "use_redirect_method": "GET",
                "v2_redirect_mode": true
            }
        });
    }
</script>
</body>
</html>
