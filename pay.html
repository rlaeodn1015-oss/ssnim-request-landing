<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스승님 - 레슨비 결제</title>
    <script src="https://cdn.bootpay.co.kr/js/bootpay-4.3.3.min.js" type="application/javascript"></script>
</head>
<body>
    <div id="status" style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; text-align: center;">
        <div id="loading-box">
            <p id="msg">결제창을 불러오는 중입니다...</p>
            <button id="retry-btn" onclick="requestPayment()" style="display:none; padding:10px 20px; background:#2563eb; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">결제창 다시 띄우기</button>
        </div>
    </div>

    <script>
        async function requestPayment() {
            const params = new URLSearchParams(window.location.search);
            const rawPrice = params.get('price') || "0";
            const price = parseInt(rawPrice.replace(/[^0-9]/g, '')) || 0;
            const name = params.get('name') || "고객님";
            const requestId = params.get('requestId') || "order_" + new Date().getTime();

            if (price <= 0) {
                alert("결제 금액 정보가 없습니다.");
                return;
            }

            if (typeof Bootpay === "undefined") {
                document.getElementById('msg').innerText = "결제 모듈 로딩 중입니다. 잠시만 기다려주세요...";
                setTimeout(requestPayment, 1000); // 1초 뒤 자동 재시도
                return;
            }

            try {
                const response = await Bootpay.requestPayment({
                    "application_id": "67ecd171d9af4e5c6d21736b",
                    "price": price,
                    "order_name": "스승님 골프 레슨비",
                    "order_id": requestId,
                    "pg": "nicepay",
                    "method": "card",
                    "user": { "username": name },
                    "extra": {
                        "open_type": "iframe",
                        "display_success_result": true
                    }
                });
                
                if (response.event === 'done') {
                    location.href = "https://rlaeodn1015-oss.github.io/ssnim-request-landing/success.html";
                }
            } catch (e) {
                console.error(e);
                alert("결제창 실행 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
            }
        }

        window.onload = requestPayment;
    </script>
</body>
</html>
