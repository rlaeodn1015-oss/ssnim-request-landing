                "✔ 회원님의 조건과 최종 매칭 중..."
            ];

            const updateData = (key, val) => setFormData(prev => ({ ...prev, [key]: val }));
            const nextStep = () => setStep(prev => prev + 1);
            const prevStep = () => setStep(prev => prev - 1);

            const startAnalysis = () => {
                setStep(5);
                let idx = 0;
                const interval = setInterval(() => {
                    idx++;
                    if (idx < loadingMessages.length) {
                        setLoadingIdx(idx);
                    } else {
                        clearInterval(interval);
                        setResults(pros);
                        setStep(6);
                    }
                }, 1000);
            };

            const CumulativeUI = () => {
                if (step > 4) return null;
                const items = [];
                if (formData.location) items.push(`📍 ${formData.location}`);
                if (formData.lessonType) items.push(`⛳ ${formData.lessonType}`);
                if (formData.club) items.push(`🏌️ ${formData.club}`);
                if (formData.concern) items.push(`💥 ${formData.concern}`);

                return html`
                    <div className="mb-6 flex flex-wrap gap-2 animate-slide-up bg-slate-50/50 p-3 rounded-2xl min-h-[48px] text-left">
                        ${items.length === 0 ? html`<p className="text-[11px] text-slate-300 font-bold self-center ml-2">요청 내용이 여기에 쌓입니다</p>` : items.map((item, idx) => html`
                            <span key=${idx} className="summary-chip animate-slide-up">
                                ${item}
                            </span>
                        `)}
                    </div>
                `;
            };

            if (step === 1) return html`
                <div className="animate-slide-up text-left">
                    <${CumulativeUI} />
                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <h3 className="text-2xl font-black text-slate-800 tracking-tight">STEP 1 / 3</h3>
                            <p className="text-brand-blue font-black text-sm mt-1">📍 레슨 환경 설정</p>
                        </div>
                    </div>
                    <div className="space-y-8">
                        <div>
                            <p className="text-xs font-bold text-slate-400 mb-4 ml-1 uppercase tracking-widest">지역 선택</p>
                            <div className="grid grid-cols-2 gap-3">
                                ${['강남', '서초', '송파', '분당'].map(l => html`
                                    <button key=${l} onClick=${() => updateData('location', l)} className=${`py-4 rounded-2xl border-2 font-bold transition-all ${formData.location === l ? 'border-brand-blue bg-blue-50 text-brand-blue shadow-lg shadow-blue-100' : 'border-slate-100 text-slate-400 hover:border-slate-200'}`}>${l}</button>
                                `)}
                            </div>
                        </div>
                        <div>
                            <p className="text-xs font-bold text-slate-400 mb-4 ml-1 uppercase tracking-widest">레슨 형태</p>
                            <div className="grid grid-cols-2 gap-3">
                                ${['필드레슨', '실내레슨', '파3레슨', '9홀레슨'].map(t => html`
                                    <button key=${t} onClick=${() => updateData('lessonType', t)} className=${`py-4 rounded-2xl border-2 font-bold transition-all ${formData.lessonType === t ? 'border-brand-blue bg-blue-50 text-brand-blue shadow-lg shadow-blue-100' : 'border-slate-100 text-slate-400 hover:border-slate-200'}`}>${t}</button>
                                `)}
                            </div>
                        </div>
                    </div>
                    <button disabled=${!formData.location || !formData.lessonType} onClick=${nextStep} className="w-full mt-12 gradient-blue text-white font-black py-5 rounded-2xl shadow-xl disabled:opacity-30 transition-all flex items-center justify-center gap-2">다음 단계로 이동 <${ChevronRight} size=${18} /></button>
                </div>
            `;

            if (step === 2) return html`
                <div className="animate-slide-up text-left">
                    <${CumulativeUI} />
                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <h3 className="text-2xl font-black text-slate-800 tracking-tight">STEP 2 / 3</h3>
                            <p className="text-brand-blue font-black text-sm mt-1">🏌️ 스윙 문제 정의</p>
                        </div>
                    </div>
                    <div className="space-y-8">
                        <div>
                            <p className="text-xs font-bold text-slate-400 mb-4 ml-1 uppercase tracking-widest">집중 클럽</p>
                            <div className="grid grid-cols-3 gap-3">
                                ${['드라이버', '아이언', '웨지', '퍼터'].map(c => html`
                                    <button key=${c} onClick=${() => updateData('club', c)} className=${`py-4 rounded-xl border-2 font-bold text-sm ${formData.club === c ? 'border-brand-blue bg-blue-50 text-brand-blue shadow-lg shadow-blue-100' : 'border-slate-100 text-slate-400'}`}>${c}</button>
                                `)}
                            </div>
                        </div>
                        <div>
                            <p className="text-xs font-bold text-slate-400 mb-4 ml-1 uppercase tracking-widest">주요 증상</p>
                            <div className="flex flex-wrap gap-2">
                                ${['슬라이스', '비거리부족', '생크', '뒤땅/탑볼', '폼교정'].map(con => html`
                                    <button key=${con} onClick=${() => updateData('concern', con)} className=${`py-3 px-6 rounded-full border-2 font-bold text-xs ${formData.concern === con ? 'border-brand-blue bg-blue-50 text-brand-blue shadow-lg shadow-blue-100' : 'border-slate-100 text-slate-400'}`}># ${con}</button>
                                `)}
                            </div>
                        </div>
                    </div>
                    <div className="flex gap-4 mt-12">
                        <button onClick=${prevStep} className="flex-1 bg-slate-100 text-slate-500 font-black py-5 rounded-2xl">이전</button>
                        <button disabled=${!formData.club || !formData.concern} onClick=${nextStep} className="flex-[2] gradient-blue text-white font-black py-5 rounded-2xl shadow-xl disabled:opacity-30">다음 단계로 이동</button>
                    </div>
                </div>
            `;

            if (step === 3) return html`
                <div className="animate-slide-up text-left">
                    <${CumulativeUI} />
                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <h3 className="text-2xl font-black text-slate-800 tracking-tight">STEP 3 / 3</h3>
                            <p className="text-brand-blue font-black text-sm mt-1">⏰ 레슨 조건 설정</p>
                        </div>
                    </div>
                    <div className="space-y-8">
                        <div>
                            <p className="text-xs font-bold text-slate-400 mb-4 ml-1 uppercase tracking-widest">선호 시간대</p>
                            <div className="grid grid-cols-2 gap-3">
                                ${['주중 낮/오후', '주중 퇴근후', '주말 오전', '주말 오후'].map(s => html`
                                    <button key=${s} onClick=${() => updateData('schedule', s)} className=${`py-4 rounded-2xl border-2 font-bold text-sm ${formData.schedule === s ? 'border-brand-blue bg-blue-50 text-brand-blue shadow-lg shadow-blue-100' : 'border-slate-100 text-slate-400'}`}>${s}</button>
                                `)}
                            </div>
                        </div>
                        <div className="bg-blue-50/50 p-5 rounded-3xl border border-blue-100/50">
                            <p className="text-brand-blue font-black text-[11px] mb-2 flex items-center gap-2 uppercase tracking-widest"><${ShieldCheck} size=${14} /> AI 매칭 보안 안내</p>
                            <p className="text-blue-700/70 text-xs font-bold leading-relaxed">회원님의 정보는 안전하게 보호되며, 매칭 확률이 가장 높은 스승님을 찾는 데만 활용됩니다.</p>
                        </div>
                    </div>
                    <div className="flex gap-4 mt-12">
                        <button onClick=${prevStep} className="flex-1 bg-slate-100 text-slate-500 font-black py-5 rounded-2xl">이전</button>
                        <button disabled=${!formData.schedule} onClick=${nextStep} className="flex-[2] gradient-blue text-white font-black py-5 rounded-2xl shadow-xl disabled:opacity-30">의뢰서 작성 완료</button>
                    </div>
                </div>
            `;

            if (step === 4) return html`
                <div className="animate-slide-up text-center">
                    <div className="w-20 h-20 bg-blue-50 text-brand-blue rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner"><${ClipboardList} size=${40} /></div>
                    <h3 className="text-3xl font-black text-slate-800 mb-2">요청서 완성!</h3>
                    <p className="text-slate-500 font-bold mb-10 text-lg">🔥 지금 조건에 맞는 스승님을 찾고 있습니다</p>
                    
                    <div className="bg-slate-50 rounded-[2.5rem] p-8 text-left mb-10 space-y-4 border border-slate-100">
                        <div className="flex justify-between items-center text-sm">
                            <span className="text-slate-400 font-bold">지역 및 형태</span>
                            <span className="font-black text-slate-700">${formData.location} / ${formData.lessonType}</span>
                        </div>
                        <div className="flex justify-between items-center text-sm border-t border-slate-200/50 pt-4">
                            <span className="text-slate-400 font-bold">집중 고민</span>
                            <span className="font-black text-slate-700">${formData.club} / ${formData.concern}</span>
                        </div>
                        <div className="flex justify-between items-center text-sm border-t border-slate-200/50 pt-4">
                            <span className="text-slate-400 font-bold">희망 시간</span>
                            <span className="font-black text-slate-700">${formData.schedule}</span>
                        </div>
                    </div>

                    <div className="flex flex-col gap-4 text-center">
                        <p className="text-brand-blue text-[11px] font-black tracking-tighter flex items-center justify-center gap-1">
                            <${ShieldCheck} size=${14} /> 이 요청서는 실제 프로 매칭에 사용됩니다
                        </p>
                        <button onClick=${startAnalysis} className="w-full gradient-blue text-white font-black py-6 rounded-3xl shadow-2xl shadow-blue-200 text-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                            → 맞춤 스승님 찾기 시작
                        </button>
                    </div>
                </div>
            `;

            if (step === 5) return html`
                <div className="py-24 text-center animate-slide-up">
                    <div className="relative w-36 h-36 mx-auto mb-12">
                        <div className="absolute inset-0 border-8 border-brand-blue/10 rounded-full"></div>
                        <div className="absolute inset-0 border-8 border-brand-blue border-t-transparent rounded-full animate-spin"></div>
                        <div className="absolute inset-0 flex items-center justify-center"><${Search} size=${48} className="text-brand-blue animate-pulse" /></div>
                    </div>
                    <h3 className="text-2xl font-black text-slate-800 mb-8 tracking-tight">회원님을 위한 스승님 분석 중</h3>
                    <div className="space-y-4 max-w-xs mx-auto text-left">
                        ${loadingMessages.map((msg, idx) => html`
                            <div key=${idx} className=${`flex items-center gap-3 font-black text-sm transition-all duration-700 ${loadingIdx >= idx ? 'text-brand-blue opacity-100' : 'text-slate-200 opacity-30'}`}>
                                <${CheckCircle2} size=${18} />
                                <span>${msg}</span>
                            </div>
                        `)}
                    </div>
                </div>
            `;

            if (step === 6) return html`
                <div className="animate-slide-up text-left">
                    <h3 className="text-2xl font-black text-slate-800 mb-8 flex items-center gap-3 tracking-tight">AI 추천 스승님 <span className="text-brand-blue bg-blue-50 px-3 py-1 rounded-full text-[10px] uppercase">Best 3</span></h3>
                    <div className="space-y-5 mb-10">
                        ${results.map(p => html`
                            <div key=${p.id} onClick=${() => setSelectedPro(p)} className=${`p-6 rounded-[2.5rem] border-2 transition-all cursor-pointer flex flex-col gap-5 ${selectedPro?.id === p.id ? 'border-brand-blue bg-blue-50 ring-8 ring-blue-50/50' : 'border-slate-50 bg-white hover:border-slate-100 shadow-sm'}`}>
                                <div className="flex items-center gap-5">
                                    <img src=${p.img} className="w-20 h-20 rounded-3xl object-cover shadow-lg" />
                                    <div className="flex-1">
                                        <div className="flex justify-between items-start mb-2">
                                            <h4 className="font-black text-slate-800 text-xl">${p.name}</h4>
                                            <div className="flex items-center text-amber-400 font-black text-sm gap-1"><${Star} size=${16} fill="currentColor" /> ${p.rating}</div>
                                        </div>
                                        <p className="text-slate-500 text-xs font-bold line-clamp-1 mb-2">"${p.intro}"</p>
                                        <div className="flex gap-2">
                                            ${p.tags.map(t => html`<span key=${t} className="text-[10px] font-black text-brand-blue bg-white border border-blue-100 px-2.5 py-1 rounded-full shadow-sm">#${t}</span>`)}
                                        </div>
                                    </div>
                                    ${selectedPro?.id === p.id && html`<div className="w-10 h-10 bg-brand-blue rounded-full flex items-center justify-center text-white shadow-lg"><${Check} size=${24} strokeWidth=${4} /></div>`}
                                </div>
                                
                                <div className=${`p-4 rounded-2xl border ${selectedPro?.id === p.id ? 'bg-white border-blue-100' : 'bg-slate-50/50 border-slate-100'}`}>
                                    <p className="text-[11px] font-black text-slate-400 mb-3 uppercase tracking-widest flex items-center gap-2"><${TrendingUp} size=${12} /> 추천 이유</p>
                                    <ul className="space-y-2">
                                        ${p.reasons.map((reason, idx) => html`
                                            <li key=${idx} className="text-xs font-bold text-slate-600 flex items-start gap-2 leading-snug">
                                                <${Check} className="text-brand-blue shrink-0 mt-0.5" size=${14} />
                                                ${reason}
                                            </li>
                                        `)}
                                    </ul>
                                </div>
                            </div>
                        `)}
                    </div>
                    <button disabled=${!selectedPro} onClick=${() => setStep(7)} className="w-full gradient-blue text-white font-black py-6 rounded-3xl shadow-2xl shadow-blue-200 text-xl active:scale-95 transition-all">스승님과 상담 시작하기</button>
                </div>
            `;

            if (step === 7) return html`
                <div className="animate-slide-up text-center py-12">
                    <div className="w-24 h-24 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-10 shadow-inner animate-bounce"><${MessageSquareText} size=${48} /></div>
                    <h3 className="text-3xl font-black text-slate-800 mb-4 tracking-tight">매칭 의뢰 성공!</h3>
                    <p className="text-slate-500 font-bold mb-12 text-lg leading-relaxed text-center">
                        ${selectedPro?.name}님과의 원활한 상담을 위해<br />
                        담당 스승님이 카카오톡으로 곧 연락드립니다.
                    </p>
                    <div className="flex flex-col gap-4 text-center">
                        <a href=${KAKAO_CHAT_URL} className="block w-full bg-[#FEE500] text-slate-850 font-black py-6 rounded-3xl shadow-xl hover:scale-105 transition-all text-xl">카카오톡 즉시 상담</a>
                        <button onClick=${() => setModalOpen(false)} className="text-slate-400 font-bold text-sm">홈으로 돌아가기</button>
                    </div>
                </div>
            `;
        };

        const MainContent = () => {
            const [formOpen, setFormOpen] = React.useState(false);

            return html`
                <div className="min-h-screen">
                    <${Header} />
                    <main>
                        <${HeroSection} setFormOpen=${setFormOpen} />
                        <${ProblemSection} />
                        <${EventSection} />
                        <${SystemSection} />
                        <${TrustSection} />
                        
                        <section id="cases" className="px-5 py-32 bg-slate-50">
                            <div className="max-w-screen-xl mx-auto text-center">
                                <h2 className="text-3xl md:text-5xl font-black mb-24 text-slate-850 tracking-tight text-center">실제 의뢰로 증명된 실력</h2>
                                <div className="grid md:grid-cols-3 gap-10 text-left">
                                    ${[
                                        { q: "슬라이스가 너무 심해요. 비거리도 안 나고..", a: "레슨 5회 만에 슬라이스 완전 정복 및 비거리 30m 증가", u: "34세 직장인 K님" },
                                        { q: "필드만 나가면 생크가 나서 미치겠어요.", a: "실전 필드 레슨 1회로 원인 파악 및 즉각 해결", u: "42세 사업가 L님" },
                                        { q: "퍼팅 스트로크가 불안정해서 쓰리퍼트가 기본..", a: "정밀 분석을 통한 루틴 정립 후 평균 퍼트 수 8개 감소", u: "29세 골린이 P님" }
                                    ].map((c, i) => html`
                                        <div key=${i} className="bg-white p-12 rounded-[3rem] shadow-sm border border-slate-100 hover:shadow-2xl hover:translate-y-[-10px] transition-all">
                                            <div className="flex gap-2 text-brand-blue mb-8"><${Star} size=${18} fill="currentColor" /> <${Star} size=${18} fill="currentColor" /> <${Star} size=${18} fill="currentColor" /> <${Star} size=${18} fill="currentColor" /> <${Star} size=${18} fill="currentColor" /></div>
                                            <p className="text-slate-400 font-bold mb-6 italic">"${c.q}"</p>
                                            <p className="text-slate-800 font-black text-2xl mb-12 leading-tight">"${c.a}"</p>
                                            <div className="flex justify-between items-center pt-8 border-t border-slate-50">
                                                <span className="text-sm font-bold text-slate-300">${c.u}</span>
                                                <div className="flex items-center gap-2 text-emerald-500 font-black text-xs bg-emerald-50 px-3 py-1.5 rounded-full"><${ThumbsUp} size=${14} /> 베스트 매칭</div>
                                            </div>
                                        </div>
                                    `)}
                                </div>
                            </div>
                        </section>

                        <section className="px-5 py-40 bg-brand-blue text-white text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-full opacity-10 flex items-center justify-center">
                                <${Target} size={600} strokeWidth={1} />
                            </div>
                            <div className="max-w-screen-md mx-auto relative z-10 text-center">
                                <h2 className="text-4xl md:text-7xl font-black mb-12 leading-tight tracking-tighter text-center">당신의 스코어를 책임질<br />단 한 명의 스승님</h2>
                                <button onClick=${() => setFormOpen(true)} className="bg-white text-brand-blue px-16 py-8 rounded-[2.5rem] font-black text-2xl shadow-[0_20px_60px_rgba(255,255,255,0.3)] hover:scale-110 transition-transform active:scale-95 mx-auto block">지금 정식 의뢰하기</button>
                                <p className="mt-8 text-blue-100 font-bold text-lg opacity-80 italic">결과가 없으면 100% 보상해 드립니다</p>
                            </div>
                        </section>
                    </main>

                    <footer className="px-5 py-24 bg-slate-900 text-white">
                        <div className="max-w-screen-xl mx-auto text-left">
                            <div className="grid md:grid-cols-2 gap-16 border-b border-slate-800 pb-16 mb-16">
                                <div>
                                    <div className="flex items-center gap-3 mb-8 text-3xl font-black tracking-tighter italic">
                                        <div className="w-10 h-10 bg-brand-blue rounded-xl flex items-center justify-center text-white not-italic text-lg">S</div>
                                        스승님
                                    </div>
                                    <p className="text-slate-500 font-bold leading-relaxed text-lg max-w-sm">
                                        스승님은 골퍼와 프로를 잇는 가장 신뢰받는 의뢰 플랫폼입니다. 
                                        우리는 단순히 매칭하지 않습니다. 결과를 만듭니다.
                                    </p>
                                </div>
                                <div className="text-sm font-bold text-slate-600 space-y-4 md:text-right">
                                    <p className="text-slate-400 font-black text-lg mb-4">Contact & Policy</p>
                                    <p>상호명: 스승님 (Suseungnim)</p>
                                    <p>법률 제휴: 법무법인 로투스 정식 계약</p>
                                    <p>개인정보처리방침 | 이용약관</p>
                                    <p className="pt-4">© 2026 Suseungnim Corp. All rights reserved.</p>
                                </div>
                            </div>
                        </div>
                    </footer>

                    <div className="fixed bottom-8 left-6 right-6 z-50 md:hidden">
                        <button onClick=${() => setFormOpen(true)} className="w-full gradient-blue py-6 rounded-3xl text-white font-black text-xl shadow-[0_20px_50px_rgba(0,102,255,0.4)] flex items-center justify-center gap-3 active:scale-95 transition-all">
                            <${Zap} size=${24} fill="white" /> 1분 매칭 의뢰 시작
                        </button>
                    </div>

                    ${formOpen && html`
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-5">
                            <div className="bg-white rounded-[3rem] max-w-lg w-full p-8 md:p-14 relative max-h-[95vh] overflow-y-auto shadow-[0_40px_100px_rgba(0,0,0,0.5)] border border-white/20">
                                <button onClick=${() => setFormOpen(false)} className="absolute top-8 right-8 text-slate-300 hover:text-slate-800 transition-colors text-right">
                                    <${X} size=${40} />
                                </button>
                                <${InteractiveFlow} setModalOpen=${setFormOpen} />
                            </div>
                        </div>
                    `}
                </div>
            `;
        };

        const rootEl = document.getElementById("root");
        createRoot(rootEl).render(html`<${MainContent} />`);
    </script>
</body>
</html>
