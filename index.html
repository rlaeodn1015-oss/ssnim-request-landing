                    <button type="button" onClick=${() => {
                        const val = window.prompt("고민 중인 내용을 상세히 입력해주세요.");
                        if (val && val.trim()) updateConcern(val.trim());
                    }} class="py-2.5 px-4 rounded-xl border-2 border-dashed border-brand-blue/30 text-brand-blue font-bold text-xs">

                </div>

            <button disabled=${!formData.club || formData.concern.length === 0} onClick=${nextStep} 
                class="flex-[2] gradient-blue text-white font-black py-4 rounded-2xl shadow-xl disabled:opacity-30">
                다음 단계로 이동
            </button>
        </div>
    </div>
    `;
}

if (step === 3) {
    const currentName = (userInfo.name || "").trim();
    const currentContact = (userInfo.contact || "").replace(/[^0-9]/g, '');

    // 🛡️ 1. 성함 정밀 검증 알고리즘
    const hasValidNameLength = /^[가-힣]{2,5}$/.test(currentName);
    const hasRepetitiveName = /(.)\1\1/.test(currentName); // 아아아 차단

    // [대표님 피드백 반영] '김이박', '이박김' 같은 성씨 단순 나열 허수 전면 차단
    const isFakeNameSequence = /^[김이박최정강조윤장임유한신오서황전문양손배백고홍신팽]{3,5}$/.test(currentName) && 
                               (currentName.includes('김') && currentName.includes('이') && currentName.includes('박'));

    const forbiddenKeywords = [
        '카톡', '카카오', '인스타', 'insta', '인별', '잉스타', '스타', '인스타그램', '잉스타그램', '익스타', '임스타', 'instagram', 'dm', 'link', 'kakao', '라인', 'line', 
        '공일공', '오픈채팅', '옵챗', '텔레그램', '영일영', '전화', '카.톡', '연락처', '리틀리', 'littly', 
        '링크트리', '.com', 'http', '유튜브', 'youtube', '번호', '공1공', 'o1o', '영1영', '0l0', 
        '아이디', '검색', '친추', '팔로우', '.kr', '.me', '.link', '계좌', '입금', '이체', '현결', '현금', 'ID',
        '시발', '지랄', '개새', '병신', '미친', '대표', '프로', '스승', '선생', '사장', '관리자', '운영자'
    ];
    const hasForbiddenKeyword = forbiddenKeywords.some(keyword => currentName.includes(keyword));
    
    // 성함 통과 마스터 조건
    const isRealName = hasValidNameLength && !hasRepetitiveName && !hasForbiddenKeyword && !isFakeNameSequence;

    // 🛡️ 2. 연락처 정밀 검증 알고리즘
    const hasValidContactPattern = /^010[0-9]{8}$/.test(currentContact);
    
    const lastDigits = currentContact.substring(3); 
    const isConsecutive = /(.)\1{4,}/.test(lastDigits); // 01011111111 차단
    const isRepetitive = lastDigits.length === 8 && lastDigits.substring(0, 4) === lastDigits.substring(4); // 01012341234 차단
    const isFakeSequential = lastDigits === "12345678" || lastDigits === "87654321"; // 12345678 차단
    
    // [대표님 피드백 반영] '01010100101' 같은 반복 도배 수열 정밀 타격 차단
    const isDobePattern = currentContact === "01010101010" || currentContact === "01001010101" || /^(010)(1010|0101)/.test(currentContact);

    // 연락처 통과 마스터 조건
    const isRealContact = hasValidContactPattern && !isConsecutive && !isRepetitive && !isFakeSequential && !isDobePattern;
    
    // 🛡️ 3. 버튼 활성화 가드
  const isBaseValid = formData.lessonDate && formData.schedule && isRealName && isRealContact;
    
    // 1:1 레슨 여부에 따른 추가 필수항목 검증 로직 명확화
    const isExtraValid = formData.lessonType === '1:1 레슨' 
        ? true 
        : (formData.price && formData.agreed);

    const isStep3Invalid = !isBaseValid || !isExtraValid;

    const handleInputFocus = (e) => {
        setTimeout(() => {
            e.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 300);
    };

    // 🔥 [CTO 핵심 긴급 수술] 버튼 클릭 시 작동하는 최종 물리 차단 밸브
    const handleNextStepClick = (e) => {
        e.preventDefault();

        // 실시간 검증 실패 시 즉시 차단 및 피드백
        if (!isRealName) {
            alert("성함 입력란에 허수가 감지되었습니다. 정확한 실명을 입력해 주세요.");
            return;
        }
        if (!isRealContact) {
            alert("유효하지 않은 연락처입니다. 010으로 시작하는 실제 휴대폰 번호를 입력해 주세요.");
            return;
        }
        if (!formData.lessonDate || !formData.schedule) {
            alert("희망 시작일과 선호 시간대를 선택해 주세요.");
            return;
        }
        if (formData.lessonType !== '1:1 레슨' && (!formData.price || !formData.agreed)) {
            alert("희망 레슨비 입력 및 안내사항 동의가 필요합니다.");
            return;
        }

        nextStep();
    };

    return html`
        <div className="animate-slide-up text-left relative pt-6 pb-24">
            <${CumulativeUI} />
            <div className="flex justify-between items-center mb-8">
                <div className="flex items-center">
                    <button onClick=${prevStep} className="mr-3 text-slate-400 hover:text-slate-800 transition-all">

                </div>

            <div className="space-y-8">

                        min=${new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0]}
                        className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-brand-blue font-bold text-slate-700 transition-all"
                        value=${formData.lessonDate} onInput=${(e) => updateData('lessonDate', e.target.value)} />
                </div>

                <div>
                    <p className="text-xs font-bold text-slate-400 mb-4 ml-1 uppercase tracking-widest text-blue-600">선호 시간대</p>

                        ${['새벽 (06~10시)', '오전 (10~13시)', '낮 (13~16시)', '오후 (16~19시)', '저녁 (19~22시)', '무관'].map((s, idx, arr) => html`
                            <button key=${s} onClick=${() => updateData('schedule', s)} 
                                className=${`py-4 rounded-2xl border-2 font-bold text-[12px] transition-all 
                                ${idx === arr.length - 1 ? 'col-span-2' : ''} 
                                ${formData.schedule === s ? 'border-brand-blue bg-blue-50 text-brand-blue shadow-lg' : 'border-slate-100 text-slate-400 bg-white'}`}>
                                ${s}
                            </button>
                        `)}
                    </div>
                </div>

                <div className="pt-8 border-t border-slate-100">
                    ${formData.lessonType === '1:1 레슨' ? html`
                        <div className="p-6 bg-blue-50 rounded-[2rem] border border-blue-100">
                            <p className="text-xs font-bold text-brand-blue mb-2 uppercase tracking-widest flex items-center gap-2">
                                <i className="fa-solid fa-circle-check"></i> 1:1 레슨 안내
                            </p>
                            <p className="text-[13px] font-bold text-slate-700 leading-tight">
                                매칭된 스승님이 설정한 <span className="text-brand-blue">회당 정찰가</span>를 기준으로 안내드립니다.
                            </p>
                        </div>
                    ` : html`
                        <div className="flex justify-between items-end mb-4 ml-1">
                            <p className="text-xs font-bold text-brand-blue uppercase tracking-widest flex items-center gap-2">
                                <i className="fa-solid fa-won-sign"></i> 희망 레슨비 제안 (총액)
                            </p>
                        </div>
                        <div className="relative mb-6">
                            <input type="number" placeholder="예: 300000" 
                                onFocus=${handleInputFocus}
                                className="w-full p-5 bg-blue-50/50 border-2 border-blue-100 rounded-[2rem] outline-none focus:border-brand-blue font-black text-2xl text-slate-800 transition-all"
                                value=${formData.price} onInput=${(e) => updateData('price', e.target.value)} />
                            <span className="absolute right-6 top-1/2 -translate-y-1/2 font-black text-slate-400 text-xl">원</span>

                            <label className="flex items-start gap-3 cursor-pointer group">
                                <input type="checkbox" 
                                    checked=${formData.agreed}
                                    onChange=${(e) => updateData('agreed', e.target.checked)}

                                <div className="flex-1 text-left">
                                    <p className="text-[11px] font-bold text-slate-600">
                                        위 제안가는 <span className="text-blue-600 font-black">총 레슨비</span>이며, <span className="underline">입장료 및 부대비용</span>은 현장 별도 결제함에 동의합니다. (필수)
                                    </p>
                                </div>
                            </label>
                        </div>
                    `}

                <div className="space-y-4 pt-6 border-t border-slate-100">

                            onFocus=${handleInputFocus}
                            className=${`w-full p-4 border-2 rounded-2xl font-bold transition-colors outline-none focus:border-brand-blue ${
                                userInfo.name && !isRealName ? 'border-red-300 bg-red-50/30 text-red-900' : 'border-slate-100 bg-slate-50 text-slate-800'

                            value=${userInfo.name} onInput=${(e) => setUserInfo(prev => ({...prev, name: e.target.value}))} />
                        ${userInfo.name && !isRealName ? html`<p className="text-red-500 text-[11px] font-bold mt-1 ml-1 animate-pulse">⚠️ 올바른 한글 실명(반복/금지어/자음나열 불가)을 입력해주세요.</p>` : null}
                    </div>

                    <div>
                        <p className="text-[11px] font-bold text-slate-400 mb-1.5 ml-1">연락처 (숫자만)</p>
                        <input type="tel" maxLength="11" placeholder="01012345678" 
                            onFocus=${handleInputFocus}
                            className=${`w-full p-4 border-2 rounded-2xl font-bold transition-colors outline-none focus:border-brand-blue ${
                                userInfo.contact && !isRealContact ? 'border-red-300 bg-red-50/30 text-red-900' : 'border-slate-100 bg-slate-50 text-slate-800'
                            }`}
                            value=${userInfo.contact} onInput=${(e) => setUserInfo(prev => ({...prev, contact: e.target.value.replace(/[^0-9]/g, '')}))} />
                        ${userInfo.contact && !isRealContact ? html`<p className="text-red-500 text-[11px] font-bold mt-1 ml-1 animate-pulse">⚠️ 유효한 정상 휴대폰 번호 형식이 아닙니다.</p>` : null}
                    </div>

                <button

                    ${isStep3Invalid ? "내용을 정확히 입력해 주세요" : "입력 완료 (다음 단계)"}
                </button>
            </div>
        </div>
    `;
}

if (step === 4) return html`

                <span className="text-slate-400 font-bold">제안 금액</span>

                맞춤 스승님 찾기 시작
            </button>
            <button onClick=${prevStep} className="text-slate-400 font-bold text-sm">수정하기</button>
        </div>
    </div>
`;

    if (step === 5) return html`
        <div className="py-24 text-center animate-slide-up relative overflow-hidden rounded-[3rem]">
            <div className="data-flow"></div>
            <div className="relative w-36 h-36 mx-auto mb-12">
                <div className="absolute inset-0 border-8 border-brand-blue/10 rounded-full"></div>
                <div className="absolute inset-0 border-8 border-brand-blue border-t-transparent rounded-full animate-spin"></div>

            <div className="space-y-4 max-w-xs mx-auto text-left">
                ${loadingMessages.map((msg, idx) => html`<div key=${idx} className=${`flex items-center gap-3 font-black text-sm transition-all duration-700 ${loadingIdx >= idx ? 'text-brand-blue opacity-100' : 'text-slate-200 opacity-30'}`}><${CheckCircle2} size=${18} /><span>${msg}</span></div>`)}
            </div>

    if (step === 6) {

    const isExpandedMatch = results.some(p => p.isExpanded);

    return html`

            <div className="space-y-6 mb-8">
                ${results.map(p => html`

                        <div className="flex justify-between items-center mb-2">

                            ${!isFixedPrice && html`<span className="text-[10px] bg-amber-100 text-amber-600 px-2 py-1 rounded-full font-black">견적 요청 가능</span>`}

                            <div className="flex-1 min-w-0">

                                <div className="flex items-center gap-2 mb-2">
