                if (p.style && p.style.includes(formData.lessonType)) arr.push(`${formData.lessonType} 특화`);
                
                if (arr.length < 2 && p.reasons?.length > 0) arr.push(p.reasons[0]);
                if (arr.length < 3 && p.reviewHighlight) arr.push(p.reviewHighlight);

                return arr.slice(0, 3);

                        const scoredPros = pros.map(p => {
                            let score = 0;
                            if (p.location.includes(formData.location)) score += 3;
                            if (p.style.includes(formData.lessonType)) score += 2;
                            if (p.tags.some(tag => tag.includes(formData.concern) || tag.includes(formData.club))) score += 5;
                            score += Math.random();
                            return { ...p, score };

                    <h3 className="text-3xl font-black text-slate-800 mb-2">요청서 완성!</h3>
                    <p className="text-slate-500 font-bold mb-10 text-lg">🔥 요청에 적합한 스승님을 바로 찾아보세요</p>

                            <span className="text-slate-400 font-bold">신청인</span>

                        <div className="flex justify-between items-center text-sm border-t border-slate-200/50 pt-4">
                            <span className="text-slate-400 font-bold">집중 고민</span>
                            <span className="font-black text-slate-700">${formData.club} / ${formData.concern}</span>
                        </div>
                        <div className="flex justify-between items-center text-sm border-t border-slate-200/50 pt-4">
                            <span className="text-slate-400 font-bold">희망 시간</span>
                            <span className="font-black text-slate-700">${formData.schedule}</span>
                        </div>
                    </div>

                    <div className="flex flex-col gap-4 text-center">
                        <p className="text-brand-blue text-[11px] font-black tracking-tighter flex items-center justify-center gap-1">

                        <button onClick=${startAnalysis} className="w-full gradient-blue text-white font-black py-4 md:py-6 text-base md:text-xl rounded-3xl shadow-2xl shadow-blue-200 flex items-center justify-center gap-3 active:scale-95 transition-all">

                        </button>
                    </div>
                </div>
            `;

            if (step === 5) return html`
                <div className="py-24 text-center animate-slide-up">
                    <div className="relative w-36 h-36 mx-auto mb-12">
                        <div className="absolute inset-0 border-8 border-brand-blue/10 rounded-full"></div>

                        <div className="absolute inset-0 flex items-center justify-center"><${Search} size=${48} className="text-brand-blue animate-pulse" /></div>
                    </div>
                    <h3 className="text-2xl font-black text-slate-800 mb-8 tracking-tight">회원님을 위한 스승님 분석 중</h3>
                    <div className="space-y-4 max-w-xs mx-auto text-left">
                        ${loadingMessages.map((msg, idx) => html`
                            <div key=${idx} className=${`flex items-center gap-3 font-black text-sm transition-all duration-700 ${loadingIdx >= idx ? 'text-brand-blue opacity-100' : 'text-slate-200 opacity-30'}`}>
                                <${CheckCircle2} size=${18} />
                                <span>${msg}</span>
                            </div>

                    </div>
                </div>
            `;

            if (step === 6) return html`

                    <div className="space-y-4 mb-6">
                        ${results.map(p => html`

                                            ${r}
                                        </span>
                                    `)}
                                </div>
                            </div>
                        `)}
                    </div>
                    
                    <div className="flex flex-col gap-3">
                        <!-- 🔥 상담 시작 시 텔레그램 알림 및 구글 시트 데이터 전송 -->
                        <button 
                          disabled=${!selectedPro} 
                          onClick=${async () => {
                            const message = `🔥 매칭 요청 발생\n\n👤 이름: ${userInfo.name}\n📞 연락처: ${userInfo.contact}\n\n📍 지역: ${formData.location}\n⛳ 레슨: ${formData.lessonType}\n🏌️ 클럽: ${formData.club}\n💥 문제: ${formData.concern}\n⏰ 시간: ${formData.schedule}\n\n🏆 선택 프로: ${selectedPro?.name}\n🔄 재매칭 횟수: ${rematchCount}`;

                            // 1. 텔레그램 전송
                            try {
                              fetch("https://api.telegram.org/bot8696133005:AAF8Uh6gK0hufHuQyufAkmZhUcjGpYCAxzE/sendMessage", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                  chat_id: "5955006042",
                                  text: message
                                })

                                  lessonType: formData.lessonType,
                                  club: formData.club,
                                  concern: formData.concern,

                    </div>
                </div>
            `;

            if (step === 7) return html`

                    <h3 className="text-3xl font-black text-slate-800 mb-4 tracking-tight">매칭 의뢰 성공!</h3>

                        <section id="cases" className="px-5 py-32 bg-slate-50">
                            <div className="max-w-screen-xl mx-auto text-center">

                                <div className="grid md:grid-cols-3 gap-10 text-left">

                                        { q: "드라이버 슬라이스 때문에 비거리도 안 나고 스트레스..", a: "레슨 4회 만에 슬라이스 구질 완전 해결 및 비거리 30m 증가", u: "36세 직장인 김x현 님" },
                                        { q: "꼭 숏아이언이 필드에서 계속 생크가 나서 미치겠어요", a: "파3 레슨 1회로 생크 원인 파악 및 즉각 해결", u: "45세 사업가 이x구 님" },

                                    ].map((c, i) => html`
                                        <div key=${i} className="bg-white p-12 rounded-[3rem] shadow-sm border border-slate-100 hover:shadow-2xl hover:translate-y-[-10px] transition-all">

                                            <p className="text-slate-400 font-bold mb-6 italic">"${c.q}"</p>
                                            <p className="text-slate-800 font-black text-2xl mb-12 leading-tight">"${c.a}"</p>
                                            <div className="flex justify-between items-center pt-8 border-t border-slate-50">
                                                <span className="text-sm font-bold text-slate-300">${c.u}</span>
                                                <div className="flex items-center gap-2 text-emerald-500 font-black text-xs bg-emerald-50 px-3 py-1.5 rounded-full"><${ThumbsUp} size=${14} /> 베스트 매칭</div>
                                            </div>
                                        </div>
                                    `)}
                                </div>
                            </div>
                        </section>

                        <section className="px-5 py-40 bg-brand-blue text-white text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-full opacity-10 flex items-center justify-center">
                                <${Target} size={600} strokeWidth={1} />
                            </div>
                            <div className="max-w-screen-md mx-auto relative z-10 text-center">
                                <h2 className="text-4xl md:text-7xl font-black mb-12 leading-tight tracking-tighter text-center">완벽한 만족을 위한<br />단 한 명의 스승님</h2>
                                <button onClick=${() => setFormOpen(true)} className="bg-white text-brand-blue px-16 py-8 rounded-[2.5rem] font-black text-2xl shadow-[0_20px_60px_rgba(255,255,255,0.3)] hover:scale-110 transition-transform active:scale-95 mx-auto block">지금 레슨 요청 하기</button>
                                <p className="mt-8 text-blue-100 font-bold text-lg opacity-80 italic">결과가 없으면 100% 보상해 드립니다</p>
                            </div>
                        </section>
                    </main>

                    <footer className="px-5 py-24 bg-slate-900 text-white">
    <div className="max-w-screen-xl mx-auto text-left">
        <div className="grid md:grid-cols-2 gap-16 border-b border-slate-800 pb-16 mb-16">
            
            <div>
                <div className="mb-8">
                    <img 
                        src="https://rlaeodn1015-oss.github.io/ssnim-request-landing/images/ssnim.png"

                        className="h-12 object-contain"
                    />
                </div>

                <p className="text-slate-500 font-bold leading-relaxed text-lg max-w-sm">
                    스승님은 골퍼와 프로를 잇는 가장 신뢰받는 의뢰 플랫폼입니다. 
                    우리는 단순히 매칭하지 않습니다. 결과를 만듭니다.
                </p>
            </div>

            <div className="text-sm font-bold text-slate-600 space-y-4 md:text-right">
                <p className="text-slate-400 font-black text-lg mb-4">Contact & Policy</p>
                <p>상호명: 스승님 (Suseungnim)</p>
                <p>법률 제휴: 법무법인 로투스 정식 계약</p>
                <p>개인정보처리방침 | 이용약관</p>
                <p className="pt-4">© 2026 Suseungnim Corp. All rights reserved.</p>
            </div>

        </div>
    </div>
</footer>

                    <div className="fixed bottom-8 left-6 right-6 z-50 md:hidden">
                        <button onClick=${() => setFormOpen(true)} className="w-full gradient-blue py-6 rounded-3xl text-white font-black text-xl shadow-[0_20px_50px_rgba(0,102,255,0.4)] flex items-center justify-center gap-3 active:scale-95 transition-all">
                            <${Zap} size=${24} fill="white" /> 1분 매칭 요청 시작
                        </button>
                    </div>

                    ${formOpen && html`
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-5">
                            <div className="bg-white rounded-[3rem] max-w-lg w-full p-8 md:p-14 relative max-h-[95vh] overflow-y-auto shadow-[0_40px_100px_rgba(0,0,0,0.5)] border border-white/20">
                                <button onClick=${() => setFormOpen(false)} className="absolute top-8 right-8 text-slate-300 hover:text-slate-800 transition-colors text-right">
                                    <${X} size=${40} />
                                </button>
                                <${InteractiveFlow} setModalOpen=${setFormOpen} />
                            </div>
                        </div>
                    `}
                </div>
            `;
        };

        const rootEl = document.getElementById("root");
        createRoot(rootEl).render(html`<${MainContent} />`);
    </script>
</body>
</html>
