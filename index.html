<script>
  // 페이지 로드 1초 후 브라우저 눈치 안 보고 '강제로' 팝업 등장시킵니다
  window.addEventListener('load', () => {
    setTimeout(() => {
      const banner = document.getElementById('pwa-install-banner');
      if (banner) {
        banner.style.display = 'block'; // display: none 해제
        setTimeout(() => banner.classList.remove('translate-y-full'), 50); // 위로 스르륵 올라오는 애니메이션
      }
    }, 1000);
  });

  // PWA 설치 조건 충족 시 브라우저 기본 팝업 연동 로직
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
  });

  document.getElementById('install-action-btn').addEventListener('click', () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then((choiceResult) => {
        if (choiceResult.outcome === 'accepted') {
          document.getElementById('pwa-install-banner').style.display = 'none';
        }
      });

    }
  });
</script>
